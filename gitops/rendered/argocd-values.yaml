global:
  domain: argocd.local

configs:
  params:
    server:
      insecure: true
  cm:
    url: https://argocd.local
    dex.config: |
      connectors:
        - type: oidc
          id: google
          name: Google
          config:
            issuer: https://accounts.google.com
            clientID: 521508938945-dj28j3b88mgc2et8tegcvt0pt4chq4kf.apps.googleusercontent.com
            clientSecret: .google.clientSecret
            hostedDomains:
              - https://project-b4952354-c0d7-4e0a-a90.firebaseapp.com/__/auth/handler

  rbac:
    policy.default: role:readonly
    policy.csv: |
      g, argocd-admins@example.com, role:admin

server:
  service:
    type: ClusterIP
